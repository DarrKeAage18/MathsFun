<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Fun! ⭐</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

<!-- Animated background -->
<div class="bg-layer" id="bgLayer"></div>

<!-- Confetti container -->
<div id="confetti-layer"></div>

<!-- Name modal -->
<div class="name-modal-overlay" id="nameModal">
  <div class="name-modal-card">
    <div class="name-modal-emoji">🧮</div>
    <h2 class="name-modal-title">Welcome to Math Fun!</h2>
    <p class="name-modal-sub">What's your name, math star? ⭐</p>
    <input type="text" id="nameInput" class="name-modal-input" placeholder="Enter your name…" maxlength="20" />
    <button class="btn btn-generate" id="btnStartGame">Let's Go! 🚀</button>
  </div>
</div>

<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="title">Math Fun!</div>
    <div class="stars-row">⭐ 🧮 ⭐</div>

    <div class="player-stats" id="playerStats">
      <div class="player-name" id="playerNameDisplay"></div>
      <div class="trophy-badge">
        🏆 <span id="pointsDisplay">0</span> pts
      </div>
      <div class="level-chip" id="levelChip">Level 1</div>
    </div>
  </header>

  <!-- Controls -->
  <div class="controls">
    <span class="label">Pick an operation:</span>

    <div class="select-wrap">
      <select class="op-select" id="opSelect">
        <option value="addition">➕ Addition</option>
        <option value="subtraction">➖ Subtraction</option>
      </select>
      <span class="select-arrow">▼</span>
    </div>

    <!-- Digits selector — hidden, controlled by level system -->
    <div id="digitsControl" style="display:none">
      <div class="select-wrap">
        <select class="op-select" id="digitsSelect">
          <option value="2">2️⃣ 2 digits</option>
          <option value="3">3️⃣ 3 digits</option>
          <option value="4">4️⃣ 4 digits</option>
        </select>
        <span class="select-arrow">▼</span>
      </div>
    </div>

    <span class="label">Carry / Borrow:</span>

    <div class="select-wrap">
      <select class="op-select" id="carrySelect">
        <option value="mix">🔀 Mix both</option>
        <option value="with">✅ With carry</option>
        <option value="without">🚫 Without carry</option>
      </select>
      <span class="select-arrow">▼</span>
    </div>

    <div class="level-badge-control" id="levelBadgeControl">
      📊 Level <span id="levelNum">1</span>
    </div>

    <button class="btn btn-generate" id="btnGenerate">🎲 Generate!</button>
    <button class="btn btn-check"    id="btnCheck"   >✅ Check Answers</button>
    <button class="btn btn-reset"    id="btnReset"   >🔄 Try Again</button>
  </div>

  <!-- Score banner -->
  <div class="score-banner" id="scoreBanner">
    <div class="score-text" id="scoreText"></div>
  </div>

  <!-- Problems -->
  <div class="problems-grid" id="problemsGrid">
    <div class="empty-state" style="grid-column:1/-1">
      <span class="empty-icon">🚀</span>
      Choose an operation and press <strong>Generate!</strong>
    </div>
  </div>

</div>

<script src="bundle.js"></script>
</body>
</html>
